media:
  input: src/assets/portfolio
  output: ../../assets/portfolio
content:
  - name: portfolio
    label: Portfolio Pieces
    path: src/content/portfolio
    filename: "{fields.title}.md"
    type: collection
    fields:
      - name: title
        label: Title
        type: string
      - name: intro
        label: Intro
        type: string
      - name: description
        label: Description
        type: string
      - name: image
        label: Image
        type: image # This MUST be 'image'
        config:
          multiple: false
      - name: publishDate
        label: Publish Date
        type: date
